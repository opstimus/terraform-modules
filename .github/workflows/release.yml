name: Release module

on:
  workflow_dispatch:
    inputs:
      module:
        description: "Module to release"
        required: true
        type: choice
        options:
          - aws-acm
          - aws-alb
          - aws-api-gateway
          - aws-aurora
          - aws-aurora-dsql
          - aws-dynamodb
          - aws-ec2-instance
          - aws-ecr
          - aws-ecs-autoscaling-scheduled
          - aws-ecs-autoscaling-standard
          - aws-ecs-cluster
          - aws-ecs-service
          - aws-ecs-task
          - aws-efs
          - aws-elasticache-redis
          - aws-github-runner
          - aws-iam-role
          - aws-iam-user
          - aws-kms
          - aws-lambda
          - aws-log-group
          - aws-msk-cluster
          - aws-rds
          - aws-s3-bucket
          - aws-secret
          - aws-ses
          - aws-site-to-site-vpn
          - aws-sns
          - aws-sqs
          - aws-target-group
          - aws-task-definition
          - aws-vpc
          - mongodb-advance
          - oci-backend-set
          - oci-container-instances
          - oci-instance
          - oci-kms-key
          - oci-kms-vault
          - oci-lb
          - oci-postgresql
          - oci-redis
          - oci-vcn
          - postgresql
      bump:
        description: "Semver bump"
        required: true
        type: choice
        options: [patch, minor, major]

permissions:
  contents: read

jobs:
  # Plan: compute old->new version and show the module diff in the run summary.
  # Runs immediately (no environment) so the approver can review before approving.
  plan:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.compute.outputs.tag }}
      old_tag: ${{ steps.compute.outputs.old_tag }}
      old_version: ${{ steps.compute.outputs.old_version }}
      new_version: ${{ steps.compute.outputs.new_version }}
      sha: ${{ steps.compute.outputs.sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Ensure commit is on main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Refusing to release: commit $GITHUB_SHA is not on origin/main. Releases must be cut from main."
            exit 1
          fi
          echo "Commit $GITHUB_SHA is on main."

      - name: Validate module exists
        shell: bash
        run: |
          set -euo pipefail
          MOD="${{ inputs.module }}"
          test -d "modules/${MOD}" || { echo "::error::modules/${MOD} not found"; exit 1; }
          ls "modules/${MOD}"/*.tf >/dev/null 2>&1 || { echo "::error::no .tf files in modules/${MOD}"; exit 1; }

      - name: Compute versions
        id: compute
        shell: bash
        run: |
          set -euo pipefail
          MOD="${{ inputs.module }}"
          git fetch --tags --quiet
          LATEST=$(git tag -l "${MOD}/v*" | sed "s#^${MOD}/v##" | sort -V | tail -n1 || true)
          if [ -z "$LATEST" ]; then
            OLD_VERSION="(none)"; OLD_TAG=""
            NEXT="1.0.0"
          else
            OLD_VERSION="$LATEST"; OLD_TAG="${MOD}/v${LATEST}"
            IFS=. read -r MAJOR MINOR PATCH <<< "$LATEST"
            case "${{ inputs.bump }}" in
              major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0;;
              minor) MINOR=$((MINOR+1)); PATCH=0;;
              patch) PATCH=$((PATCH+1));;
            esac
            NEXT="${MAJOR}.${MINOR}.${PATCH}"
          fi
          TAG="${MOD}/v${NEXT}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "::error::tag ${TAG} already exists"; exit 1
          fi
          {
            echo "tag=${TAG}"
            echo "old_tag=${OLD_TAG}"
            echo "old_version=${OLD_VERSION}"
            echo "new_version=${NEXT}"
            echo "sha=${GITHUB_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Release plan summary + diff
        shell: bash
        run: |
          set -euo pipefail
          MOD="${{ inputs.module }}"
          OLD_TAG="${{ steps.compute.outputs.old_tag }}"
          NEW_TAG="${{ steps.compute.outputs.tag }}"
          {
            echo "## Release plan"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Module | \`${MOD}\` |"
            echo "| Bump | ${{ inputs.bump }} |"
            echo "| Old version | ${{ steps.compute.outputs.old_version }} |"
            echo "| New version | ${{ steps.compute.outputs.new_version }} |"
            echo "| New tag | \`${NEW_TAG}\` |"
            echo "| Commit | \`${GITHUB_SHA}\` |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Release plan: ${MOD} ${{ steps.compute.outputs.old_version }} -> ${{ steps.compute.outputs.new_version }} (${NEW_TAG})"
          if [ -z "$OLD_TAG" ]; then
            echo "_First release for this module — no previous version to compare._" >> "$GITHUB_STEP_SUMMARY"
            echo "First release for ${MOD}."
          else
            raw=$(git log --no-merges --format='%H%x09%s' "${OLD_TAG}..${GITHUB_SHA}" -- "modules/${MOD}")
            if [ -z "$raw" ]; then
              echo "⚠️ _No new commits in \`modules/${MOD}\` since \`${OLD_TAG}\` — you would be re-releasing identical content._" >> "$GITHUB_STEP_SUMMARY"
              echo "::warning::No commits in modules/${MOD} since ${OLD_TAG}."
            else
              {
                echo "### Commits in \`modules/${MOD}\` since \`${OLD_TAG}\`"
                echo ""
                echo "| Commit | Message |"
                echo "|--------|---------|"
                printf '%s\n' "$raw" | while IFS=$'\t' read -r sha subj; do
                  subj=${subj//|/\\|}
                  echo "| [\`${sha:0:7}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${sha}) | ${subj} |"
                done
              } >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "=== commits ${OLD_TAG}..HEAD (modules/${MOD}) ==="
            printf '%s\n' "$raw"
          fi

  # Release: gated by the prod environment (approval). Uses the exact tag + commit
  # from the plan job, so the approved version/module is what gets released.
  release:
    needs: plan
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify plan still valid
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.plan.outputs.tag }}"
          SHA="${{ needs.plan.outputs.sha }}"
          git fetch origin main --quiet
          if ! git merge-base --is-ancestor "$SHA" origin/main; then
            echo "::error::Planned commit $SHA is not on origin/main."; exit 1
          fi
          git fetch --tags --quiet
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "::error::Tag ${TAG} already exists."; exit 1
          fi
          echo "Verified: releasing ${TAG} at ${SHA}."

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.plan.outputs.tag }}"
          SHA="${{ needs.plan.outputs.sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" "$SHA"
          git push origin "refs/tags/$TAG"
          gh release create "$TAG" --title "$TAG" --target "$SHA" --generate-notes
          echo "## Released \`${TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Released ${TAG} at ${SHA}"
